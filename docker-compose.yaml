version: '3.8'

services:
  # Streamlit UI 服务
  app:
    image: alpha-workbench:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: alpha-workbench-app
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      # 挂载数据目录用于持久化
      - ./alpha_workbench/data:/app/alpha_workbench/data
      - ./runs:/app/runs
    command: streamlit run alpha_workbench/app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - alpha-workbench-net
    restart: unless-stopped

  # CLI 服务（可选）- 用于演示 mock demo
  # 取消注释下方内容可启用 CLI 服务
  # cli:
  #   build:
  #     context: .
  #     dockerfile: Dockerfile
  #   container_name: alpha-workbench-cli
  #   volumes:
  #     - ./runs:/app/runs
  #   env_file:
  #     - .env
  #   command: alpha-workbench-demo --save-trace
  #   networks:
  #     - alpha-workbench-net
  #   depends_on:
  #     - app

networks:
  alpha-workbench-net:
    driver: bridge
